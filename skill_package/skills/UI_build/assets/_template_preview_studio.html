<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Preview</title>
</head>
<body>
  <p id="apiStatus">Checking API…</p>
<script>
/* === FULLSTACK_API_BEGIN — maintained by skill tools, do not delete === */
const API_BASE = (window.__STUDIO_API_BASE__ || 'http://127.0.0.1:8000/api');
async function apiGet(path) {
  const url = API_BASE.replace(/\/$/, '') + (path.startsWith('/') ? path : '/' + path);
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
  return res.json();
}
async function apiPost(path, body) {
  const url = API_BASE.replace(/\/$/, '') + (path.startsWith('/') ? path : '/' + path);
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
  return res.json();
}
async function checkBackendHealth() {
  try {
    await apiGet('/health');
    const el = document.getElementById('apiStatus');
    if (el) { el.textContent = 'API connected'; el.className = 'status online'; }
    return true;
  } catch (e) {
    const el = document.getElementById('apiStatus');
    if (!el) return false;
    el.textContent = 'API not connected (' + API_BASE + ')';
    el.className = 'status offline';
    return false;
  }
}
/* === FULLSTACK_API_END === */

checkBackendHealth();

    // Business logic: use apiGet('/your-route') only; paths from get_fullstack_api_contract.backend_routes
</script>
</body>
</html>
