<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>员工职称管理系统 - 预览</title>
<!-- Font Awesome 图标库 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- ECharts 图表 -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f0f2f5; color: #333; }

/* 布局 */
.app-container { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: linear-gradient(180deg, #001529 0%, #002140 100%); color: #fff; padding: 20px 0; flex-shrink: 0; }
.sidebar-title { padding: 16px 20px; font-size: 18px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.sidebar-title i { color: #1890ff; }
.sidebar .nav-item { padding: 12px 24px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.65); transition: all 0.3s; border-left: 3px solid transparent; }
.sidebar .nav-item:hover { color: #fff; background: rgba(255,255,255,0.08); }
.sidebar .nav-item.active { color: #fff; background: #1890ff; border-left-color: #fff; }
.main-content { flex:1; padding: 24px; overflow-y: auto; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.header h2 { font-size: 22px; font-weight: 600; }
.header .badge { background: #e6f7ff; color: #1890ff; padding: 4px 12px; border-radius: 12px; font-size: 13px; }

/* 卡片 */
.card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

/* 统计卡片行 */
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center; }
.stat-card .num { font-size: 32px; font-weight: 700; color: #1890ff; }
.stat-card .label { font-size: 14px; color: #666; margin-top: 4px; }

/* 表格 */
table { width:100%; border-collapse: collapse; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
th { background: #fafafa; font-weight: 600; color: #555; }
tr:hover { background: #f5f5f5; }

/* 按钮 */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all 0.3s; }
.btn-primary { background: #1890ff; color: #fff; }
.btn-primary:hover { background: #40a9ff; }
.btn-success { background: #52c41a; color: #fff; }
.btn-success:hover { background: #73d13d; }
.btn-danger { background: #ff4d4f; color: #fff; }
.btn-danger:hover { background: #ff7875; }
.btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
.btn-default:hover { border-color: #1890ff; color: #1890ff; }
.btn-sm { padding: 4px 12px; font-size: 12px; }

/* 标签 */
.tag { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.tag-pending { background: #fff7e6; color: #fa8c16; }
.tag-approved { background: #f6ffed; color: #52c41a; }
.tag-rejected { background: #fff2f0; color: #ff4d4f; }
.tag-info { background: #e6f7ff; color: #1890ff; }
.tag-junior { background: #f0f5ff; color: #2f54eb; }
.tag-mid { background: #fff7e6; color: #d46b08; }
.tag-senior { background: #fff2f0; color: #cf1322; }

/* 搜索框 */
.search-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.search-bar input, .search-bar select { padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; }
.search-bar input:focus, .search-bar select:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
.search-bar input { flex: 1; min-width: 200px; }

/* 弹窗模态 */
.modal-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000; justify-content: center; align-items: center; }
.modal-mask.show { display: flex; }
.modal-box { background: #fff; border-radius: 8px; width: 560px; max-width: 90vw; max-height: 80vh; overflow-y: auto; padding: 24px; }
.modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 4px; color: #333; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; }
.form-group textarea { min-height: 80px; resize: vertical; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }

/* 图表容器 */
.chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.chart-box { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.chart-box .chart-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
.chart-canvas { width: 100%; height: 320px; }

/* 分页 */
.pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 16px; }
.pagination button { padding: 6px 14px; border: 1px solid #d9d9d9; border-radius: 6px; background: #fff; cursor: pointer; }
.pagination button:hover { border-color: #1890ff; color: #1890ff; }
.pagination button:disabled { color: #ccc; cursor: not-allowed; border-color: #eee; }
.pagination .page-info { font-size: 14px; color: #666; }

/* 响应式 */
@media (max-width: 900px) { .sidebar { width: 60px; } .sidebar .nav-item span { display: none; } .sidebar-title span { display: none; } .chart-container { grid-template-columns: 1fr; } }

/* ===== 页面容器 ===== */
.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>
<div class="app-container">
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-title"><i class="fas fa-id-card"></i><span>职称管理系统</span></div>
    <div class="nav-item active" data-tab="overview" onclick="switchTab('overview')"><i class="fas fa-chart-pie"></i><span>分布概览</span></div>
    <div class="nav-item" data-tab="apply" onclick="switchTab('apply')"><i class="fas fa-pen"></i><span>职称申请</span></div>
    <div class="nav-item" data-tab="approve" onclick="switchTab('approve')"><i class="fas fa-check-circle"></i><span>职称审批</span></div>
  </div>

  <!-- 主内容 -->
  <div class="main-content">
    <div class="header">
      <h2 id="pageTitle">📊 职称分布概览</h2>
      <span class="badge"><i class="fas fa-database"></i> 数据源自 real API</span>
    </div>

    <!-- ===== 页面1: 分布概览 ===== -->
    <div id="page-overview" class="page active">
      <div class="stat-row" id="overviewStats">
        <div class="stat-card"><div class="num" id="empCount">—</div><div class="label">员工总数</div></div>
        <div class="stat-card"><div class="num" id="deptCount">—</div><div class="label">部门数</div></div>
        <div class="stat-card"><div class="num" id="appCount">—</div><div class="label">申请总数</div></div>
        <div class="stat-card"><div class="num" id="pendingCount">—</div><div class="label">待审批</div></div>
      </div>
      <div class="card">
        <div class="card-title"><i class="fas fa-filter"></i> 筛选条件</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <select id="deptFilter" onchange="loadOverviewData()" style="padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;min-width:150px;">
            <option value="">全部部门</option>
          </select>
          <select id="titleFilter" onchange="loadOverviewData()" style="padding:8px 12px;border:1px solid #d9d9d9;border-radius:6px;font-size:14px;min-width:150px;">
            <option value="">全部职称</option>
            <option value="无职称">无职称</option>
            <option value="初级职称">初级职称</option>
            <option value="中级职称">中级职称</option>
            <option value="高级职称">高级职称</option>
          </select>
        </div>
      </div>
      <div class="chart-container">
        <div class="chart-box">
          <div class="chart-title"><i class="fas fa-chart-bar"></i> 各部门职称分布</div>
          <div id="chartDept" class="chart-canvas"></div>
        </div>
        <div class="chart-box">
          <div class="chart-title"><i class="fas fa-graduation-cap"></i> 学历 vs 职称</div>
          <div id="chartEdu" class="chart-canvas"></div>
        </div>
      </div>
      <!-- 按职称筛选的员工信息表 -->
      <div class="card" style="margin-top:16px;">
        <div class="card-title"><i class="fas fa-users"></i> 人员信息 <span id="titleTableLabel" style="font-size:14px;color:#999;font-weight:400;"></span></div>
        <table>
          <thead><tr><th>编号</th><th>姓名</th><th>部门</th><th>岗位</th><th>学历</th><th>职称</th><th>工龄</th></tr></thead>
          <tbody id="titleEmpTableBody"><tr><td colspan="7" style="text-align:center;color:#999;">请选择职称进行筛选</td></tr></tbody>
        </table>
        <div class="pagination" id="titleEmpPagination" style="margin-top:12px;"></div>
      </div>
    </div>

    <!-- ===== 页面2: 职称申请 ===== -->
    <div id="page-apply" class="page">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
          <div class="search-bar" style="margin-bottom:0;">
            <input type="text" id="applySearch" placeholder="搜索员工编号或姓名..." oninput="loadApplications()">
            <select id="applyDept" onchange="loadApplications()"><option value="">全部部门</option></select>
          </div>
          <button class="btn btn-primary" onclick="openApplyModal()"><i class="fas fa-plus"></i> 提交申请</button>
        </div>
        <table>
          <thead><tr><th>编号</th><th>员工</th><th>部门</th><th>当前职称</th><th>申请职称</th><th>状态</th><th>申请时间</th></tr></thead>
          <tbody id="applyTableBody"><tr><td colspan="7" style="text-align:center;color:#999;">加载中...</td></tr></tbody>
        </table>
        <div class="pagination" id="applyPagination"></div>
      </div>
    </div>

    <!-- ===== 页面3: 职称审批 ===== -->
    <div id="page-approve" class="page">
      <div class="card">
        <div class="search-bar">
          <select id="approveStatus" onchange="loadApprovals()">
            <option value="">全部状态</option>
            <option value="待审批">待审批</option>
            <option value="已通过">已通过</option>
            <option value="已驳回">已驳回</option>
          </select>
          <select id="approveDept" onchange="loadApprovals()"><option value="">全部部门</option></select>
        </div>
        <table>
          <thead><tr><th>ID</th><th>员工</th><th>部门</th><th>当前职称</th><th>申请职称</th><th>状态</th><th>审批人</th><th>操作</th></tr></thead>
          <tbody id="approveTableBody"><tr><td colspan="8" style="text-align:center;color:#999;">加载中...</td></tr></tbody>
        </table>
        <div class="pagination" id="approvePagination"></div>
      </div>
    </div>
  </div>
</div>

<!-- ===== 申请弹窗 ===== -->
<div class="modal-mask" id="applyModal">
  <div class="modal-box">
    <div class="modal-title"><i class="fas fa-pen"></i> 提交职称申请</div>
    <div class="form-group">
      <label>员工编号</label>
      <input type="text" id="modalEmpId" placeholder="请输入员工编号" list="empList">
      <datalist id="empList"></datalist>
    </div>
    <div class="form-group">
      <label>员工信息</label>
      <div id="modalEmpInfo" style="font-size:13px;color:#666;background:#fafafa;padding:8px 12px;border-radius:6px;">输入编号后自动加载</div>
    </div>
    <div class="form-group">
      <label>申请职称等级</label>
      <select id="modalTitle">
        <option value="">请选择</option>
        <option value="初级职称">初级职称</option>
        <option value="中级职称">中级职称</option>
        <option value="高级职称">高级职称</option>
      </select>
    </div>
    <div class="form-group">
      <label>申请理由</label>
      <textarea id="modalReason" placeholder="请输入申请理由..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-default" onclick="closeApplyModal()">取消</button>
      <button class="btn btn-primary" onclick="submitApplication()"><i class="fas fa-paper-plane"></i> 提交</button>
    </div>
  </div>
</div>

<!-- ===== 审批弹窗 ===== -->
<div class="modal-mask" id="reviewModal">
  <div class="modal-box">
    <div class="modal-title"><i class="fas fa-clipboard-check"></i> 审批职称申请</div>
    <div id="reviewDetail" style="margin-bottom:16px;font-size:14px;"></div>
    <div class="form-group">
      <label>审批人</label>
      <input type="text" id="reviewerName" placeholder="请输入审批人姓名" value="管理员">
    </div>
    <div class="form-group">
      <label>审批意见</label>
      <textarea id="reviewComment" placeholder="请输入审批意见..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-default" onclick="closeReviewModal()">取消</button>
      <button class="btn btn-danger" onclick="doReview('reject')"><i class="fas fa-times"></i> 驳回</button>
      <button class="btn btn-success" onclick="doReview('approve')"><i class="fas fa-check"></i> 通过</button>
    </div>
  </div>
</div>

<script>
const API_BASE = '/api';
let currentPage = { overview: 1, apply: 1, approve: 1 };
const PAGE_SIZE = 15;

// ========== 标签切换 ==========
function switchTab(tab) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');

  const titles = { overview: '📊 职称分布概览', apply: '📝 职称申请', approve: '✅ 职称审批' };
  document.getElementById('pageTitle').textContent = titles[tab] || '';

  if (tab === 'overview') loadOverview();
  if (tab === 'apply') loadApplications();
  if (tab === 'approve') loadApprovals();
}

// ========== 全局数据加载 ==========
async function apiGet(url) {
  try {
    const res = await fetch(API_BASE + url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error(url, e);
    return null;
  }
}
async function apiPost(url, body) {
  try {
    const res = await fetch(API_BASE + url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return await res.json();
  } catch (e) { console.error(url, e); return null; }
}
async function apiPut(url, body) {
  try {
    const res = await fetch(API_BASE + url, {
      method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return await res.json();
  } catch (e) { console.error(url, e); return null; }
}

// ========== 概览 ==========
async function loadOverview() {
  const data = await apiGet('/statistics/overview');
  if (!data) return;
  document.getElementById('empCount').textContent = data.employee_count;
  document.getElementById('deptCount').textContent = data.department_count;
  document.getElementById('appCount').textContent = data.application_count;
  document.getElementById('pendingCount').textContent = data.application_status?.['待审批'] || 0;

  // 加载部门下拉
  const deptRes = await apiGet('/employees/departments');
  if (deptRes) {
    const sel = document.getElementById('deptFilter');
    sel.innerHTML = '<option value="">全部部门</option>' + deptRes.data.map(d => `<option value="${d}">${d}</option>`).join('');
  }
  // 同步其他页面的部门下拉
  const deptOpts = document.getElementById('deptFilter')?.innerHTML || '';
  document.getElementById('applyDept').innerHTML = deptOpts;
  document.getElementById('approveDept').innerHTML = deptOpts;

  loadOverviewData();
}

async function loadOverviewData() {
  const dept = document.getElementById('deptFilter').value;
  const title = document.getElementById('titleFilter').value;

  // 更新图表（只依赖部门筛选）
  loadCharts();

  // 如果选择了职称，加载人员信息表
  if (title) {
    loadTitleEmpTable(title, dept, 1);
    document.getElementById('titleTableLabel').textContent = `— 当前筛选: 「${title}」`;
  } else {
    document.getElementById('titleEmpTableBody').innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">请选择职称进行筛选</td></tr>';
    document.getElementById('titleEmpPagination').innerHTML = '';
    document.getElementById('titleTableLabel').textContent = '';
  }
}

async function loadTitleEmpTable(title, department, page) {
  const params = new URLSearchParams({ professional_title: title, page, page_size: 15 });
  if (department) params.set('department', department);

  const res = await apiGet('/employees-by-title?' + params.toString());
  if (!res) return;

  const tbody = document.getElementById('titleEmpTableBody');
  if (res.data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">暂无符合条件的人员</td></tr>';
  } else {
    tbody.innerHTML = res.data.map(e => {
      const tagClass = e.professional_title === '无职称' ? 'info' : e.professional_title === '初级职称' ? 'junior' : e.professional_title === '中级职称' ? 'mid' : 'senior';
      return `<tr>
        <td><strong>${e.emp_id}</strong></td>
        <td>${e.name}</td>
        <td>${e.department}</td>
        <td>${e.job_position}</td>
        <td>${e.education}</td>
        <td><span class="tag tag-${tagClass}">${e.professional_title}</span></td>
        <td>${e.seniority}年</td>
      </tr>`;
    }).join('');
  }

  // 分页
  const totalPages = Math.ceil(res.total / 15) || 1;
  document.getElementById('titleEmpPagination').innerHTML = `
    <button onclick="loadTitleEmpTable('${title}', '${department || ''}', ${page - 1})" ${page <= 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> 上一页</button>
    <span class="page-info">第 ${page} / ${totalPages} 页（共 ${res.total} 人）</span>
    <button onclick="loadTitleEmpTable('${title}', '${department || ''}', ${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页 <i class="fas fa-chevron-right"></i></button>
  `;
}

async function loadCharts() {
  const dept = document.getElementById('deptFilter').value;
  // 部门职称分布
  const dist = await apiGet(`/statistics/title-distribution${dept ? `?department=${encodeURIComponent(dept)}` : ''}`);
  if (dist && dist.data) {
    const chart = echarts.init(document.getElementById('chartDept'));
    chart.setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['无职称', '初级职称', '中级职称', '高级职称'] },
      xAxis: { type: 'category', data: dist.data.map(d => d.department), axisLabel: { rotate: 30 } },
      yAxis: { type: 'value' },
      series: [
        { name: '无职称', type: 'bar', stack: 'total', data: dist.data.map(d => d.no_title), itemStyle: { color: '#d9d9d9' } },
        { name: '初级职称', type: 'bar', stack: 'total', data: dist.data.map(d => d.junior), itemStyle: { color: '#2f54eb' } },
        { name: '中级职称', type: 'bar', stack: 'total', data: dist.data.map(d => d.mid), itemStyle: { color: '#d46b08' } },
        { name: '高级职称', type: 'bar', stack: 'total', data: dist.data.map(d => d.senior), itemStyle: { color: '#cf1322' } },
      ]
    });
    window.addEventListener('resize', () => chart.resize());
  }

  // 学历 vs 职称
  const edu = await apiGet('/statistics/title-by-education');
  if (edu && edu.data) {
    const chart2 = echarts.init(document.getElementById('chartEdu'));
    chart2.setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['无职称', '初级职称', '中级职称', '高级职称'] },
      xAxis: { type: 'category', data: edu.data.map(d => d.education) },
      yAxis: { type: 'value' },
      series: [
        { name: '无职称', type: 'bar', stack: 'total', data: edu.data.map(d => d.no_title), itemStyle: { color: '#d9d9d9' } },
        { name: '初级职称', type: 'bar', stack: 'total', data: edu.data.map(d => d.junior), itemStyle: { color: '#2f54eb' } },
        { name: '中级职称', type: 'bar', stack: 'total', data: edu.data.map(d => d.mid), itemStyle: { color: '#d46b08' } },
        { name: '高级职称', type: 'bar', stack: 'total', data: edu.data.map(d => d.senior), itemStyle: { color: '#cf1322' } },
      ]
    });
    window.addEventListener('resize', () => chart2.resize());
  }
}

// ========== 申请列表 ==========
async function loadApplications() {
  const keyword = document.getElementById('applySearch').value;
  const dept = document.getElementById('applyDept').value;
  const page = currentPage.apply;
  const params = new URLSearchParams({ page, page_size: PAGE_SIZE });
  if (keyword) params.set('emp_id', keyword);
  if (dept) params.set('department', dept);

  const res = await apiGet('/applications?' + params.toString());
  if (!res) return;
  const tbody = document.getElementById('applyTableBody');
  if (res.data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">暂无数据</td></tr>';
  } else {
    tbody.innerHTML = res.data.map(a => {
      const curTag = a.current_title === '无职称' ? 'info' : a.current_title === '初级职称' ? 'junior' : a.current_title === '中级职称' ? 'mid' : 'senior';
      const titleTag = a.applied_title === '初级职称' ? 'junior' : a.applied_title === '中级职称' ? 'mid' : 'senior';
      const statusTag = a.status === '待审批' ? 'pending' : a.status === '已通过' ? 'approved' : 'rejected';
      return `<tr>
        <td><strong>${a.emp_id}</strong></td>
        <td>${a.emp_name}</td>
        <td>${a.department}</td>
        <td><span class="tag tag-${curTag}">${a.current_title}</span></td>
        <td><span class="tag tag-${titleTag}">${a.applied_title}</span></td>
        <td><span class="tag tag-${statusTag}">${a.status}</span></td>
        <td>${a.created_at ? a.created_at.split('T')[0] : '—'}</td>
      </tr>`;
    }).join('');
  }
  renderPagination('apply', res.total, res.page);
}

// ========== 申请弹窗 ==========
function openApplyModal() {
  document.getElementById('applyModal').classList.add('show');
  document.getElementById('modalEmpInfo').textContent = '输入编号后自动加载';
  document.getElementById('modalTitle').value = '';
  document.getElementById('modalReason').value = '';
  // 预加载员工列表
  apiGet('/employees?page_size=200').then(r => {
    if (r) {
      document.getElementById('empList').innerHTML = r.data.map(e => `<option value="${e.emp_id}">${e.emp_id} - ${e.name} (${e.department})</option>`).join('');
    }
  });
}
function closeApplyModal() { document.getElementById('applyModal').classList.remove('show'); }

let cachedEmp = null;
document.getElementById('modalEmpId')?.addEventListener('input', async function() {
  const v = this.value.trim();
  if (v.length >= 3) {
    const res = await apiGet('/employees/' + v);
    if (res && res.emp_id) {
      cachedEmp = res;
      document.getElementById('modalEmpInfo').innerHTML = `
        <strong>${res.name}</strong> | ${res.department} | ${res.job_position} | 当前职称: <strong>${res.professional_title}</strong> | 学历: ${res.education} | 工龄: ${res.seniority}年
      `;
    }
  }
});

async function submitApplication() {
  const empId = document.getElementById('modalEmpId').value.trim();
  const title = document.getElementById('modalTitle').value;
  const reason = document.getElementById('modalReason').value;
  if (!empId || !title) { alert('请填写员工编号并选择申请职称'); return; }
  const res = await apiPost('/applications', { emp_id: empId, applied_title: title, reason });
  if (res && res.ok) {
    alert('申请已提交成功！');
    closeApplyModal();
    loadApplications();
  } else {
    alert(res?.detail || '提交失败，请检查员工编号或职称等级');
  }
}

// ========== 审批列表 ==========
async function loadApprovals() {
  const status = document.getElementById('approveStatus').value;
  const dept = document.getElementById('approveDept').value;
  const page = currentPage.approve;
  const params = new URLSearchParams({ page, page_size: PAGE_SIZE });
  if (status) params.set('status', status);
  if (dept) params.set('department', dept);

  const res = await apiGet('/applications?' + params.toString());
  if (!res) return;
  const tbody = document.getElementById('approveTableBody');
  if (res.data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#999;">暂无数据</td></tr>';
  } else {
    tbody.innerHTML = res.data.map(a => {
      const statusTag = a.status === '待审批' ? 'pending' : a.status === '已通过' ? 'approved' : 'rejected';
      const titleTag = a.applied_title === '初级职称' ? 'junior' : a.applied_title === '中级职称' ? 'mid' : 'senior';
      return `<tr>
        <td>#${a.id}</td>
        <td><strong>${a.emp_name}</strong><br><small style="color:#999;">${a.emp_id}</small></td>
        <td>${a.department}</td>
        <td><span class="tag tag-${a.current_title === '无职称' ? 'info' : a.current_title === '初级职称' ? 'junior' : a.current_title === '中级职称' ? 'mid' : 'senior'}">${a.current_title}</span></td>
        <td><span class="tag tag-${titleTag}">${a.applied_title}</span></td>
        <td><span class="tag tag-${statusTag}">${a.status}</span></td>
        <td>${a.reviewer || '—'}</td>
        <td>${a.status === '待审批' ? `<button class="btn btn-success btn-sm" onclick="openReviewModal(${a.id})"><i class="fas fa-check"></i> 审批</button>` : '<small style="color:#999;">已处理</small>'}</td>
      </tr>`;
    }).join('');
  }
  renderPagination('approve', res.total, res.page);
}

// ========== 审批弹窗 ==========
let currentReviewId = null;
async function openReviewModal(id) {
  currentReviewId = id;
  const res = await apiGet('/applications/' + id);
  if (!res) return;
  document.getElementById('reviewDetail').innerHTML = `
    <table style="font-size:13px;">
      <tr><td style="width:100px;color:#888;">员工</td><td><strong>${res.emp_name}</strong> (${res.emp_id})</td></tr>
      <tr><td style="color:#888;">部门</td><td>${res.department}</td></tr>
      <tr><td style="color:#888;">当前职称</td><td>${res.current_title}</td></tr>
      <tr><td style="color:#888;">申请职称</td><td><strong>${res.applied_title}</strong></td></tr>
      <tr><td style="color:#888;">申请理由</td><td>${res.reason || '无'}</td></tr>
      <tr><td style="color:#888;">申请时间</td><td>${res.created_at || '—'}</td></tr>
    </table>
  `;
  document.getElementById('reviewerName').value = '管理员';
  document.getElementById('reviewComment').value = '';
  document.getElementById('reviewModal').classList.add('show');
}
function closeReviewModal() { document.getElementById('reviewModal').classList.remove('show'); currentReviewId = null; }

async function doReview(action) {
  if (!currentReviewId) return;
  const reviewer = document.getElementById('reviewerName').value.trim();
  const comment = document.getElementById('reviewComment').value;
  if (!reviewer) { alert('请输入审批人姓名'); return; }
  const res = await apiPut(`/applications/${currentReviewId}/review`, {
    reviewer, review_comment: comment, action,
  });
  if (res && res.ok) {
    alert(res.message);
    closeReviewModal();
    loadApprovals();
  } else {
    alert(res?.detail || '操作失败');
  }
}

// ========== 分页 ==========
function renderPagination(type, total, page) {
  const el = document.getElementById(type + 'Pagination');
  const totalPages = Math.ceil(total / PAGE_SIZE) || 1;
  el.innerHTML = `
    <button onclick="goPage('${type}', ${page - 1})" ${page <= 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> 上一页</button>
    <span class="page-info">第 ${page} / ${totalPages} 页（共 ${total} 条）</span>
    <button onclick="goPage('${type}', ${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页 <i class="fas fa-chevron-right"></i></button>
  `;
}
function goPage(type, p) {
  if (p < 1) return;
  currentPage[type] = p;
  if (type === 'apply') loadApplications();
  if (type === 'approve') loadApprovals();
}

// ========== 初始化 ==========
loadOverview();
</script>
